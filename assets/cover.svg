<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="60%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>

    <!-- Blue accent glow -->
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Green accent glow -->
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0"/>
    </radialGradient>

    <!-- Node glow filter -->
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for large nodes -->
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text shadow -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Subtle border glow -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#3fb950" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Command bar gradient -->
    <linearGradient id="cmdBarGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#21262d"/>
      <stop offset="100%" stop-color="#1c2128"/>
    </linearGradient>

    <!-- Pill badge gradient blue -->
    <linearGradient id="pillBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#142d4a"/>
    </linearGradient>

    <!-- Pill badge gradient green -->
    <linearGradient id="pillGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3d28"/>
      <stop offset="100%" stop-color="#143022"/>
    </linearGradient>
  </defs>

  <!-- ==================== BACKGROUND ==================== -->
  <rect width="1280" height="640" fill="url(#bgGlow)"/>

  <!-- Ambient glow spots -->
  <ellipse cx="350" cy="280" rx="400" ry="300" fill="url(#blueGlow)"/>
  <ellipse cx="950" cy="350" rx="350" ry="280" fill="url(#greenGlow)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="1278" height="638" rx="0" ry="0" fill="none" stroke="url(#borderGrad)" stroke-width="1"/>

  <!-- ==================== CONSTELLATION NETWORK ==================== -->
  <!-- Connection lines - left cluster -->
  <g stroke="#58a6ff" stroke-opacity="0.12" stroke-width="1" fill="none">
    <line x1="80" y1="120" x2="200" y2="180"/>
    <line x1="200" y1="180" x2="150" y2="300"/>
    <line x1="200" y1="180" x2="320" y2="150"/>
    <line x1="320" y1="150" x2="380" y2="260"/>
    <line x1="150" y1="300" x2="280" y2="350"/>
    <line x1="280" y1="350" x2="380" y2="260"/>
    <line x1="80" y1="120" x2="150" y2="300"/>
    <line x1="320" y1="150" x2="200" y2="180"/>
    <line x1="60" y1="400" x2="150" y2="300"/>
    <line x1="60" y1="400" x2="180" y2="460"/>
    <line x1="180" y1="460" x2="280" y2="350"/>
    <line x1="280" y1="350" x2="350" y2="470"/>
    <line x1="180" y1="460" x2="350" y2="470"/>
    <line x1="110" y1="530" x2="180" y2="460"/>
    <line x1="110" y1="530" x2="60" y2="400"/>
  </g>

  <!-- Connection lines - right cluster -->
  <g stroke="#3fb950" stroke-opacity="0.12" stroke-width="1" fill="none">
    <line x1="950" y1="100" x2="1080" y2="160"/>
    <line x1="1080" y1="160" x2="1200" y2="120"/>
    <line x1="1080" y1="160" x2="1050" y2="280"/>
    <line x1="1200" y1="120" x2="1220" y2="250"/>
    <line x1="1220" y1="250" x2="1050" y2="280"/>
    <line x1="950" y1="100" x2="1050" y2="280"/>
    <line x1="1050" y1="280" x2="1150" y2="380"/>
    <line x1="1220" y1="250" x2="1150" y2="380"/>
    <line x1="920" y1="350" x2="1050" y2="280"/>
    <line x1="920" y1="350" x2="1150" y2="380"/>
    <line x1="1150" y1="380" x2="1230" y2="460"/>
    <line x1="920" y1="350" x2="980" y2="480"/>
    <line x1="980" y1="480" x2="1100" y2="510"/>
    <line x1="1100" y1="510" x2="1230" y2="460"/>
    <line x1="1150" y1="380" x2="1100" y2="510"/>
    <line x1="1100" y1="510" x2="1200" y2="570"/>
    <line x1="1230" y1="460" x2="1200" y2="570"/>
  </g>

  <!-- Cross-cluster faint connections -->
  <g stroke="#8b949e" stroke-opacity="0.06" stroke-width="1" fill="none">
    <line x1="380" y1="260" x2="920" y2="350"/>
    <line x1="350" y1="470" x2="980" y2="480"/>
    <line x1="320" y1="150" x2="950" y2="100"/>
  </g>

  <!-- ==================== CONSTELLATION NODES ==================== -->
  <!-- Left cluster nodes (blue) -->
  <g filter="url(#nodeGlow)">
    <!-- Large nodes -->
    <circle cx="200" cy="180" r="4" fill="#58a6ff" opacity="0.9"/>
    <circle cx="280" cy="350" r="3.5" fill="#58a6ff" opacity="0.85"/>
    <circle cx="150" cy="300" r="3" fill="#58a6ff" opacity="0.8"/>

    <!-- Medium nodes -->
    <circle cx="80" cy="120" r="2.5" fill="#58a6ff" opacity="0.7"/>
    <circle cx="320" cy="150" r="2.5" fill="#58a6ff" opacity="0.7"/>
    <circle cx="380" cy="260" r="2.5" fill="#58a6ff" opacity="0.75"/>
    <circle cx="60" cy="400" r="2.5" fill="#58a6ff" opacity="0.65"/>
    <circle cx="180" cy="460" r="2" fill="#58a6ff" opacity="0.6"/>

    <!-- Small nodes -->
    <circle cx="350" cy="470" r="2" fill="#58a6ff" opacity="0.55"/>
    <circle cx="110" cy="530" r="1.5" fill="#58a6ff" opacity="0.45"/>
    <circle cx="250" cy="100" r="1.5" fill="#58a6ff" opacity="0.4"/>
    <circle cx="420" cy="180" r="1.5" fill="#58a6ff" opacity="0.35"/>
    <circle cx="30" cy="250" r="1.5" fill="#58a6ff" opacity="0.3"/>
    <circle cx="450" cy="400" r="1.5" fill="#58a6ff" opacity="0.3"/>
  </g>

  <!-- Right cluster nodes (green) -->
  <g filter="url(#nodeGlow)">
    <!-- Large nodes -->
    <circle cx="1080" cy="160" r="4" fill="#3fb950" opacity="0.9"/>
    <circle cx="1150" cy="380" r="3.5" fill="#3fb950" opacity="0.85"/>
    <circle cx="1050" cy="280" r="3" fill="#3fb950" opacity="0.8"/>

    <!-- Medium nodes -->
    <circle cx="950" cy="100" r="2.5" fill="#3fb950" opacity="0.7"/>
    <circle cx="1200" cy="120" r="2.5" fill="#3fb950" opacity="0.7"/>
    <circle cx="1220" cy="250" r="2.5" fill="#3fb950" opacity="0.75"/>
    <circle cx="920" cy="350" r="2.5" fill="#3fb950" opacity="0.65"/>
    <circle cx="1230" cy="460" r="2.5" fill="#3fb950" opacity="0.6"/>

    <!-- Small nodes -->
    <circle cx="980" cy="480" r="2" fill="#3fb950" opacity="0.55"/>
    <circle cx="1100" cy="510" r="2" fill="#3fb950" opacity="0.5"/>
    <circle cx="1200" cy="570" r="1.5" fill="#3fb950" opacity="0.45"/>
    <circle cx="870" cy="200" r="1.5" fill="#3fb950" opacity="0.35"/>
    <circle cx="1250" cy="350" r="1.5" fill="#3fb950" opacity="0.3"/>
    <circle cx="900" cy="530" r="1.5" fill="#3fb950" opacity="0.3"/>
  </g>

  <!-- Scattered ambient dots -->
  <g>
    <circle cx="500" cy="80" r="1" fill="#8b949e" opacity="0.25"/>
    <circle cx="640" cy="50" r="1" fill="#8b949e" opacity="0.2"/>
    <circle cx="780" cy="75" r="1" fill="#8b949e" opacity="0.25"/>
    <circle cx="550" cy="560" r="1" fill="#8b949e" opacity="0.2"/>
    <circle cx="730" cy="580" r="1" fill="#8b949e" opacity="0.2"/>
    <circle cx="600" cy="140" r="1" fill="#58a6ff" opacity="0.15"/>
    <circle cx="700" cy="520" r="1" fill="#3fb950" opacity="0.15"/>
    <circle cx="480" cy="500" r="1" fill="#58a6ff" opacity="0.12"/>
    <circle cx="820" cy="130" r="1" fill="#3fb950" opacity="0.12"/>
  </g>

  <!-- ==================== MAIN TITLE ==================== -->
  <text x="640" y="252" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-1.5" filter="url(#textShadow)">AI Builders Brief</text>

  <!-- ==================== SUBTITLE ==================== -->
  <text x="640" y="310" text-anchor="middle" font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#8b949e" letter-spacing="3">Follow Builders, Not Influencers</text>

  <!-- ==================== DECORATIVE LINE ==================== -->
  <line x1="480" y1="345" x2="800" y2="345" stroke="#30363d" stroke-width="1"/>
  <!-- Accent segment on the line -->
  <line x1="590" y1="345" x2="640" y2="345" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="640" y1="345" x2="690" y2="345" stroke="#3fb950" stroke-width="1.5" opacity="0.6"/>

  <!-- ==================== DATA SOURCE BADGES ==================== -->
  <!-- Badge: 25+ Builders on X -->
  <g transform="translate(310, 380)">
    <rect x="0" y="0" width="195" height="38" rx="19" fill="url(#pillBlue)" stroke="#58a6ff" stroke-opacity="0.3" stroke-width="1"/>
    <!-- X icon (simplified) -->
    <g transform="translate(18, 11)">
      <path d="M0 0 L6.5 8 M6.5 0 L0 8" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" fill="none" transform="scale(1.1)"/>
    </g>
    <text x="40" y="24" font-family="'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#58a6ff">25+ Builders on X</text>
  </g>

  <!-- Badge: 6 Podcasts -->
  <g transform="translate(530, 380)">
    <rect x="0" y="0" width="150" height="38" rx="19" fill="url(#pillGreen)" stroke="#3fb950" stroke-opacity="0.3" stroke-width="1"/>
    <!-- Podcast/headphone icon -->
    <g transform="translate(16, 10)">
      <path d="M2 12 L2 10 C2 5 5 2 9 2 C13 2 16 5 16 10 L16 12" stroke="#3fb950" stroke-width="1.3" stroke-linecap="round" fill="none"/>
      <rect x="0" y="12" width="4" height="5" rx="1.5" fill="#3fb950" opacity="0.8"/>
      <rect x="14" y="12" width="4" height="5" rx="1.5" fill="#3fb950" opacity="0.8"/>
    </g>
    <text x="40" y="24" font-family="'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#3fb950">6 Podcasts</text>
  </g>

  <!-- Badge: Official Blogs -->
  <g transform="translate(705, 380)">
    <rect x="0" y="0" width="170" height="38" rx="19" fill="url(#pillBlue)" stroke="#58a6ff" stroke-opacity="0.3" stroke-width="1"/>
    <!-- Blog/document icon -->
    <g transform="translate(16, 9)">
      <rect x="1" y="0" width="13" height="17" rx="2" stroke="#58a6ff" stroke-width="1.2" fill="none"/>
      <line x1="4" y1="5" x2="11" y2="5" stroke="#58a6ff" stroke-width="1" opacity="0.7"/>
      <line x1="4" y1="8.5" x2="11" y2="8.5" stroke="#58a6ff" stroke-width="1" opacity="0.7"/>
      <line x1="4" y1="12" x2="8" y2="12" stroke="#58a6ff" stroke-width="1" opacity="0.7"/>
    </g>
    <text x="40" y="24" font-family="'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="600" fill="#58a6ff">Official Blogs</text>
  </g>

  <!-- ==================== BOTTOM COMMAND BAR ==================== -->
  <g transform="translate(340, 475)">
    <!-- Terminal-style container -->
    <rect x="0" y="0" width="600" height="48" rx="10" fill="url(#cmdBarGrad)" stroke="#30363d" stroke-width="1"/>

    <!-- Terminal dots -->
    <circle cx="20" cy="24" r="4.5" fill="#ff5f56" opacity="0.8"/>
    <circle cx="36" cy="24" r="4.5" fill="#ffbd2e" opacity="0.8"/>
    <circle cx="52" cy="24" r="4.5" fill="#27c93f" opacity="0.8"/>

    <!-- Prompt symbol -->
    <text x="76" y="29" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="15" fill="#8b949e">$</text>

    <!-- Command text -->
    <text x="96" y="29" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="15" fill="#e6edf3">npx skills add wifecooky/ai-builders-brief</text>

    <!-- Blinking cursor -->
    <rect x="530" y="15" width="2" height="18" fill="#58a6ff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ==================== BOTTOM ACCENT LINE ==================== -->
  <rect x="0" y="636" width="1280" height="4" fill="#0d1117"/>
  <rect x="0" y="636" width="640" height="4" fill="#58a6ff" opacity="0.15"/>
  <rect x="640" y="636" width="640" height="4" fill="#3fb950" opacity="0.15"/>
  <rect x="540" y="636" width="200" height="4" rx="0">
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>